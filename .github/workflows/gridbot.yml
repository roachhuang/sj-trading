name: Gridbot Daily Run

on:
  schedule:
    # 06:17 Asia/Taipei (UTC+8) = 22:17 UTC previous day, Sun-Thu UTC (which
    # is Mon-Fri Taipei once shifted). Off the top-of-hour mark deliberately
    # -- GitHub Actions scheduled runs are most prone to delay/drop at
    # exact-hour slots under high load.
    # GitHub cron can't skip Taiwan market holidays, so this still fires
    # on non-trading days; the run will just fail/no-op against the API.
    - cron: '23 23 * * 0-4'
  workflow_dispatch:
    inputs:
      seed_money:
        description: >-
          Overwrite money.json with this cash balance (e.g. 30000) instead
          of the committed value. Leave empty for a normal run.
        required: false
        default: ""
      seed_only:
        description: >-
          Write seed_money to money.json and stop, skipping the live trading
          run entirely. Use this to correct money.json without placing orders.
        required: false
        default: false
        type: boolean

# SJ_PRODUCTION=true below means every trigger (schedule or manual) places
# real orders. Without this, a manual workflow_dispatch overlapping with a
# delayed/late-firing schedule run (or two manual runs) would run two live
# trading sessions against the same account in parallel. cancel-in-progress
# is false deliberately: forcibly killing a live run mid-order-placement is
# worse than making the second trigger wait its turn.
concurrency:
  group: gridbot-live-trading
  cancel-in-progress: false

# Repo default is "Read repository contents and packages permissions"
# (restricted). actions/upload-artifact needs write access under the
# `actions` scope specifically, not `contents`. contents: write is needed
# separately, for this workflow's own commit-back of money.json below.
permissions:
  contents: write
  actions: write

jobs:
  run-gridbot:
    runs-on: ubuntu-latest
    # GridbotBody runs from ~9:00 to ~14:00 Taiwan time; give it headroom
    # but keep a hard cap so a stuck run doesn't burn Actions minutes all day.
    timeout-minutes: 360
    env:
      SJ_PRODUCTION: "true"
      # gridbot_body.py gates its trading loop on datetime.now() wall-clock
      # hours (act 09:00-13:30, cancel at 13:2x, exit at 14-15). Runners
      # default to UTC, which shifts those gates -8h: the exit window becomes
      # 22:00 Taipei so the job dies at timeout-minutes instead of exiting
      # cleanly, and money.json is never persisted.
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      # money.json (bot1.money) is a tracked file, not gitignored runtime
      # state -- checkout above already gives each run the balance the
      # previous run committed back. This makes it directly readable/editable
      # (git history, GitHub web UI) without needing a workflow run to
      # inspect or correct it, and avoids actions/cache's 7-day inactivity
      # eviction, which could silently reset the balance after a holiday gap.
      - name: Seed money.json
        if: github.event.inputs.seed_money != ''
        run: |
          uv run python -c "
          import json
          v = float('${{ github.event.inputs.seed_money }}')
          v = int(v) if v.is_integer() else v
          with open('money.json', 'w') as f:
              json.dump(v, f)
          print('seeded money.json with', v)
          "
      # Only needed for live trading (SJ_PRODUCTION=true below). GitHub
      # Actions has no native file-secret type, so the CA cert is stored
      # base64-encoded in SJ_CA_PFX_B64 and decoded to disk here, at the
      # relative path gridbot_body.py's activate_ca() call expects.
      - name: Write CA certificate
        if: env.SJ_PRODUCTION == 'true' && github.event.inputs.seed_only != 'true'
        run: echo "${{ secrets.SJ_CA_PFX_B64 }}" | base64 -d > Sinopac.pfx
      - run: uv run python -m sj_trading.gridbot_body
        if: github.event.inputs.seed_only != 'true'
        env:
          SJ_API_KEY: ${{ secrets.SJ_API_KEY }}
          SJ_SEC_KEY: ${{ secrets.SJ_SEC_KEY }}
          SJ_CA_PASSWD: ${{ secrets.SJ_CA_PASSWD }}
          SJ_PERSON_ID: ${{ secrets.SJ_PERSON_ID }}
      # gridbot_body.py rewrites money.json locally at its natural 14:00-15:00
      # exit, on KeyboardInterrupt, or via the seed step above; commit that
      # back so the next run's checkout picks it up. if: always() covers the
      # seed-only path (gridbot_body didn't run) and normal-failure paths;
      # a hard-cancelled job still can't reach this step, same limitation
      # actions/cache had. The diff check makes a no-op run a no-op commit.
      - name: Persist money.json
        if: always()
        run: |
          if ! git diff --quiet -- money.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add money.json
            git commit -m "Update money.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git fetch origin ${{ github.ref_name }}
            git rebase origin/${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "money.json unchanged, nothing to commit"
          fi
      # gridbot.log/shioaji.log only exist on the runner's local disk and are
      # otherwise lost once the job ends; upload them even on failure/timeout
      # since that's exactly when they're needed most.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gridbot-logs-${{ github.run_id }}
          path: |
            gridbot.log
            shioaji.log
          if-no-files-found: ignore
